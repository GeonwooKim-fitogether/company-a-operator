# 회사 A 데이터 접근 정책

version: "1.0"

google_drive:
  access: read-only
  approved_folders:
    - description: "운영 문서 (예시 — 실제 폴더 ID로 교체)"
      # folder_id: actual-folder-id
  prohibited:
    - copying_full_content_to_github
    - copying_full_content_to_supabase
    - sharing_outside_company

gbrain:
  scope: company-a-only
  cross_company_access: denied

output_classification:
  internal_draft:
    can_share: internal-only
    requires_approval: false
  final_report:
    can_share: internal-only
    requires_approval: true
  external_document:
    can_share: external
    requires_approval: true
    requires_legal_review: true
