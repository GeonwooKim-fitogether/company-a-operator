# 회사 A 평가 Rubric
# Core의 default-rubric을 상속하고 회사 A 전용 기준을 추가한다.

id: company-a-rubric
version: "1.0"
inherits_from: "../../digital-operator-core/evals/rubrics/default-rubric.yaml"

dimensions:
  - id: objective-achievement
    weight: 0.25
    description: "목표 달성도"
    scoring:
      5: "완료조건 전부 충족"
      3: "주요 완료조건 충족, 부분 미흡"
      1: "핵심 완료조건 미충족"

  - id: source-traceability
    weight: 0.20
    description: "출처 추적 가능성"
    scoring:
      5: "모든 주요 사실에 Drive 파일 ID 또는 Episode ID 기재"
      3: "일부 출처 누락"
      1: "출처 없는 주장 다수"

  - id: factual-accuracy
    weight: 0.20
    description: "사실 정확성"
    scoring:
      5: "오류 없음"
      3: "사소한 오류 1-2건"
      1: "중요한 오류 또는 잘못된 결론"

  - id: completeness
    weight: 0.15
    description: "완전성 — 누락 없음"
    scoring:
      5: "누락 없음"
      3: "부차적 항목 누락"
      1: "핵심 항목 누락"

  - id: reusability
    weight: 0.10
    description: "재사용 가능성"
    scoring:
      5: "다른 프로젝트에 직접 적용 가능한 패턴 명시"
      3: "부분적으로 재사용 가능"
      1: "재사용 어려움"

  - id: policy-compliance
    weight: 0.10
    description: "회사 정책 준수"
    scoring:
      5: "모든 정책 준수"
      3: "경미한 정책 위반"
      1: "중요한 정책 위반"

verdicts:
  pass:
    min_score: 75
    condition: "policy-compliance >= 4 이상 필수"
  revise:
    score_range: "50-74"
  fail:
    max_score: 49
    or_condition: "policy-compliance < 3"
